<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧮 پلتفرم جامع ریاضی - ابزارهای جامع محاسباتی</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --math: #a855f7;
            --ai: #06b6d4;
            --dark: #1e293b;
            --darker: #0f172a;
            --light: #f8fafc;
            --gray: #94a3b8;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            --gradient-dark: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            --gradient-success: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --gradient-warning: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            --gradient-danger: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            --gradient-ai: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.12);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.16);
            --shadow-xl: 0 32px 64px rgba(0,0,0,0.2);
            --shadow-glow: 0 0 30px rgba(99, 102, 241, 0.3);
            --border-radius: 16px;
            --border-radius-lg: 24px;
            --border-radius-xl: 32px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --blur: blur(20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--gradient-dark);
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--glass);
            backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        header {
            background: var(--gradient-primary);
            color: white;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shine 6s linear infinite;
            transform: rotate(45deg);
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            position: relative;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .description {
            font-size: 1.2em;
            opacity: 0.95;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            background: linear-gradient(135deg, #34495e, #2c3e50);
            padding: 0;
            gap: 1px;
            position: relative;
            z-index: 10;
        }

        .tab {
            padding: 18px 20px;
            cursor: pointer;
            color: white;
            border: none;
            background: #4a6fa5;
            font-size: 15px;
            transition: var(--transition);
            flex: 1;
            min-width: 140px;
            position: relative;
            overflow: hidden;
            font-weight: 600;
        }

        .tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .tab:hover::before {
            left: 100%;
        }

        .tab:hover {
            background: #5a7fb5;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .tab.active {
            background: var(--accent);
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
            transform: translateY(0);
        }

        .tab-content {
            display: none;
            padding: 40px;
            min-height: 600px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tab-content.active {
            display: block;
        }

        /* استایل‌های ابزارهای ریاضی */
        .calculator {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--light);
            font-size: 16px;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--border-radius);
            font-size: 16px;
            transition: var(--transition);
            color: var(--light);
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.2);
            outline: none;
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
        }

        button {
            background: var(--gradient-primary);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 16px;
            transition: var(--transition);
            margin: 8px;
            font-weight: bold;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-glow);
        }

        button:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: var(--gradient-ai);
        }

        .btn-secondary:hover {
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
        }

        .btn-success {
            background: var(--gradient-success);
        }

        .btn-success:hover {
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-ai {
            background: var(--gradient-ai);
        }

        .btn-ai:hover {
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
        }

        .result {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: var(--border-radius);
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            white-space: pre-wrap;
            border-right: 5px solid var(--accent);
            animation: slideIn 0.4s ease;
            box-shadow: var(--shadow-md);
            color: var(--light);
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .tool-description {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: var(--border-radius);
            margin-bottom: 30px;
            border-right: 5px solid var(--accent);
            box-shadow: var(--shadow-md);
        }

        .tool-description h3 {
            color: var(--accent);
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 20px;
        }

        .history {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            max-height: 250px;
            overflow-y: auto;
            box-shadow: var(--shadow-md);
        }

        .history h3 {
            margin-bottom: 15px;
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 8px;
        }

        .history-item {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
            transition: var(--transition);
            color: var(--light);
        }

        .history-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        /* استایل‌های هوش مصنوعی */
        .ai-chat-container {
            display: flex;
            flex-direction: column;
            height: 500px;
            border: 2px solid var(--accent);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 80%;
            animation: messageSlide 0.3s ease-out;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: var(--gradient-primary);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .ai-message {
            background: rgba(255, 255, 255, 0.1);
            color: var(--light);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom-left-radius: 5px;
        }

        .chat-input-container {
            display: flex;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-input {
            flex: 1;
            margin-right: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: var(--light);
            padding: 10px 15px;
            border-radius: var(--border-radius);
        }

        /* استایل‌های تاریخچه ریاضیات */
        .mathematician-card {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition);
        }

        .mathematician-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            background: rgba(255, 255, 255, 0.08);
        }

        .mathematician-image {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-left: 20px;
            border: 3px solid var(--accent);
        }

        .mathematician-info {
            flex: 1;
        }

        .mathematician-name {
            color: var(--accent);
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .mathematician-era {
            color: var(--warning);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .mathematician-contributions {
            line-height: 1.7;
            color: var(--light);
        }

        .search-container {
            margin-bottom: 30px;
        }

        .quick-actions {
            margin-top: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
        }

        .quick-actions h4 {
            color: var(--accent);
            margin-bottom: 15px;
        }

        /* استایل کارت 3D */
        .math-game-3d {
            perspective: 1000px;
            width: 300px;
            height: 400px;
            margin: 30px auto;
            cursor: pointer;
        }

        .math-card-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s;
        }

        .math-card-3d.flipped {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: var(--border-radius);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-shadow: var(--shadow-md);
        }

        .card-front {
            background: var(--gradient-primary);
            color: white;
        }

        .card-back {
            background: var(--gradient-ai);
            color: white;
            transform: rotateY(180deg);
        }

        .card-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.5em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .card-description {
            text-align: center;
            font-size: 0.9em;
            opacity: 0.9;
        }

        /* تعاریف ریاضی */
        .definition-category {
            margin-bottom: 40px;
        }

        .definition-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            padding: 25px;
            margin-bottom: 20px;
            border-right: 4px solid var(--accent);
            transition: var(--transition);
        }

        .definition-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            background: rgba(255, 255, 255, 0.08);
        }

        .definition-term {
            color: var(--accent);
            font-size: 1.3em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .definition-content {
            color: var(--light);
            line-height: 1.8;
        }

        .definition-example {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: var(--border-radius);
            margin-top: 15px;
            border-right: 3px solid var(--warning);
            font-style: italic;
        }

        /* مقالات تاریخچه */
        .article-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: var(--border-radius);
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: var(--transition);
        }

        .article-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            background: rgba(255, 255, 255, 0.08);
        }

        .article-title {
            color: var(--accent);
            font-size: 1.6em;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .article-meta {
            color: var(--warning);
            font-size: 0.9em;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }

        .article-content {
            line-height: 1.8;
            color: var(--light);
        }

        .article-section {
            margin-bottom: 20px;
        }

        .article-section h4 {
            color: var(--success);
            margin-bottom: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .calculator {
                grid-template-columns: 1fr;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            .tab {
                min-width: auto;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .button-group button {
                width: 100%;
            }
            
            .mathematician-card {
                flex-direction: column;
                text-align: center;
            }
            
            .mathematician-image {
                margin-left: 0;
                margin-bottom: 20px;
                width: 120px;
                height: 120px;
            }
            
            h1 {
                font-size: 2.2em;
            }
            
            .container {
                padding: 15px;
            }
            
            .tab-content {
                padding: 25px;
            }
            
            .math-game-3d {
                width: 250px;
                height: 350px;
            }
            
            .article-card {
                padding: 20px;
            }
        };
        /*فوتر خففففففففففن!*/
        .cyber-developer-credit {
            background: var(--gradient-neon);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 900;
            margin-top: 20px;
            font-size: 1.3rem;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        .cyber-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            display: block;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 3;
            filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.5));
        }

        .cyber-card:hover .cyber-icon {
            transform: scale(1.2) rotate(10deg);
            filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.8));
        }
    </style>
</head>

        mathTools.forEach((tool, index) => {
            const tab = document.createElement('button');
            tab.className = 'tab' + (index === 0 ? ' active' : '');
            tab.textContent = tool.name;
            tab.setAttribute('aria-selected', index === 0);
            tab.onclick = () => switchTab(index);
            tabsContainer.appendChild(tab);

            const content = document.createElement('div');
            content.className = 'tab-content' + (index === 0 ? ' active' : '');
            content.id = 'tab' + index;
            content.setAttribute('aria-labelledby', 'tab' + index);
            content.innerHTML = `
                <div class="tool-description">
                    <h3>${tool.name}</h3>
                    <p>${tool.description}</p>
                </div>
                ${createToolContent(tool.name, index)}
            `;
            tabContents.appendChild(content);
        });

        // تابع تغییر تب
        function switchTab(index) {
            document.querySelectorAll('.tab').forEach((tab, i) => {
                tab.classList.toggle('active', i === index);
                tab.setAttribute('aria-selected', i === index);
            });
            document.querySelectorAll('.tab-content').forEach((content, i) => {
                content.classList.toggle('active', i === index);
            });

        // توابع محاسباتی واقعی
        function checkPrime(index) {
            const num = parseInt(document.getElementById(`primeInput${index}`).value);
            if (isNaN(num) || num < 2) {
                document.getElementById(`primeResult${index}`).textContent = 'لطفا عددی بزرگتر از 1 وارد کنید';
                return;
            }

            let isPrime = true;
            if (num === 2) {
                isPrime = true;
            } else if (num % 2 === 0) {
                isPrime = false;
            } else {
                for (let i = 3; i <= Math.sqrt(num); i += 2) {
                    if (num % i === 0) {
                        isPrime = false;
                        break;
                    }
                }
            }

            document.getElementById(`primeResult${index}`).textContent = 
                `${num} ${isPrime ? 'عدد اول است ✓' : 'عدد اول نیست ✗'}`;
        }

        function factorize(index) {
            const num = parseInt(document.getElementById(`factorInput${index}`).value);
            if (isNaN(num) || num < 2) {
                document.getElementById(`factorResult${index}`).textContent = 'لطفا عددی بزرگتر از 1 وارد کنید';
                return;
            }

            let factors = [];
            let temp = num;
            let divisor = 2;

            while (temp > 1) {
                if (temp % divisor === 0) {
                    factors.push(divisor);
                    temp /= divisor;
                } else {
                    divisor++;
                }
            }

            document.getElementById(`factorResult${index}`).textContent = 
                `${num} = ${factors.join(' × ')}`;
        }

        function countDivisors(index) {
            const num = parseInt(document.getElementById(`divisorInput${index}`).value);
            if (isNaN(num) || num < 1) {
                document.getElementById(`divisorResult${index}`).textContent = 'لطفا عدد صحیح مثبت وارد کنید';
                return;
            }

            let count = 0;
            let divisors = [];
            for (let i = 1; i <= num; i++) {
                if (num % i === 0) {
                    count++;
                    divisors.push(i);
                }
            }

            document.getElementById(`divisorResult${index}`).textContent = 
                `تعداد مقسوم‌علیه‌ها: ${count}\nمقسوم‌علیه‌ها: ${divisors.join(', ')}`;
        }

        function calculateGCDLCM(index) {
            const a = parseInt(document.getElementById(`num1${index}`).value);
            const b = parseInt(document.getElementById(`num2${index}`).value);
            
            if (isNaN(a) || isNaN(b)) {
                document.getElementById(`gcdlcmResult${index}`).textContent = 'لطفا دو عدد وارد کنید';
                return;
            }

            function gcd(x, y) {
                return y === 0 ? x : gcd(y, x % y);
            }

            const gcdValue = gcd(Math.abs(a), Math.abs(b));
            const lcmValue = Math.abs(a * b) / gcdValue;

            document.getElementById(`gcdlcmResult${index}`).textContent = 
                `ب م م (${a}, ${b}) = ${gcdValue}\nک م م (${a}, ${b}) = ${lcmValue}`;
        }

        function calculatePower(index) {

            const exponent = parseFloat(document.getElementById(`exponentInput${index}`).value);

                document.getElementById(`powerResult${index}`).textContent = 'لطفا مقادیر معتبر وارد کنید';

            const result = Math.pow(base, exponent);

        function calculatePythagoras(index) {

        function findMissingSide(index) {

            const missingSide = Math.sqrt(hypotenuse*hypotenuse - knownSide*knownSide).toFixed(4);

        // تاریخچه محاسبات برای ماشین حساب

        function egyptianFraction(index) {
            let numerator = parseInt(document.getElementById(`numerator${index}`).value);
            let denominator = parseInt(document.getElementById(`denominator${index}`).value);
            
            if (isNaN(numerator) || isNaN(denominator) || numerator >= denominator) {
                document.getElementById(`egyptianResult${index}`).textContent = 'صورت باید کوچکتر از مخرج باشد';
                return;
            }

            let result = [];
            while (numerator > 0) {
                let x = Math.ceil(denominator / numerator);
                result.push(`1/${x}`);
                numerator = numerator * x - denominator;
                denominator = denominator * x;
            }

            document.getElementById(`egyptianResult${index}`).textContent = 
                `کسر مصری: ${result.join(' + ')}`;
        }

        function calculateCombination(index) {
            const n = parseInt(document.getElementById(`nComb${index}`).value);
            const r = parseInt(document.getElementById(`rComb${index}`).value);
            
            if (isNaN(n) || isNaN(r) || r > n || n < 0 || r < 0) {
                document.getElementById(`combinationResult${index}`).textContent = 'لطفا مقادیر معتبر وارد کنید';
                return;
            }

            function factorial(x) {
                let result = 1n;
                for (let i = 2; i <= x; i++) result *= BigInt(i);
                return result;
            }

            const comb = factorial(n) / (factorial(r) * factorial(n - r));
            document.getElementById(`combinationResult${index}`).textContent = 
                `C(${n}, ${r}) = ${comb}`;
        }

        function generatePascal(index) {
            const row = parseInt(document.getElementById(`pascalRow${index}`).value);
            
            if (isNaN(row) || row < 0 || row > 15) {
                document.getElementById(`pascalResult${index}`).textContent = 'لطفا عددی بین 0 تا 15 وارد کنید';
                return;
            }

            function pascalRow(n) {
                let row = [1];
                for (let i = 1; i <= n; i++) {
                    row.push(row[i-1] * (n - i + 1) / i);
                }
                return row;
            }

            const resultRow = pascalRow(row);
            document.getElementById(`pascalResult${index}`).textContent = 
                `سطر ${row}: ${resultRow.join(' ')}`;
        }

        function generatePascalTriangle(index) {
            const rows = parseInt(document.getElementById(`pascalRow${index}`).value);
            
            if (isNaN(rows) || rows < 0 || rows > 10) {
                document.getElementById(`pascalResult${index}`).textContent = 'لطفا عددی بین 0 تا 10 وارد کنید';
                return;
            }

            let triangle = [];
            for (let i = 0; i <= rows; i++) {
                let row = [1];
                for (let j = 1; j <= i; j++) {
                    row.push(row[j-1] * (i - j + 1) / j);
                }
                triangle.push(row.join(' '));
            }

            document.getElementById(`pascalResult${index}`).textContent = 
                `مثلث خیام-پاسکال:\n${triangle.join('\n')}`;
        }

        function calculateMean(index) {

            const mean = numbers.reduce((a, b) => a + b) / numbers.length;
            document.getElementById(`averageResult${index}`).textContent =

        function calculateMedian(index) {
            const numbers = document.getElementById(`numbersInput${index}`).value
                .split(',')
                .map(num => parseFloat(num.trim()))
                .filter(num => !isNaN(num))
                .sort((a, b) => a - b);

            if (numbers.length === 0) {
                document.getElementById(`averageResult${index}`).textContent = 'لطفا اعداد معتبر وارد کنید';
                return;
            }

            let median;
            const mid = Math.floor(numbers.length / 2);
            
            if (numbers.length % 2 === 0) {
                median = (numbers[mid-1] + numbers[mid]) / 2;
            } else {
                median = numbers[mid];
            }

            document.getElementById(`averageResult${index}`).textContent = 
                `میانه: ${median.toFixed(4)}`;
        }

        function calculateAllAverages(index) {
            const numbers = document.getElementById(`numbersInput${index}`).value
                .split(',')
                .map(num => parseFloat(num.trim()))
                .filter(num => !isNaN(num))
                .sort((a, b) => a - b);

            if (numbers.length === 0) {
                document.getElementById(`averageResult${index}`).textContent = 'لطفا اعداد معتبر وارد کنید';
                return;
            }

            const mean = numbers.reduce((a, b) => a + b) / numbers.length;
            
            let median;
            const mid = Math.floor(numbers.length / 2);
            if (numbers.length % 2 === 0) {
                median = (numbers[mid-1] + numbers[mid]) / 2;
            } else {
                median = numbers[mid];
            }

            // مد
            let frequency = {};
            let maxFreq = 0;
            let modes = [];
            
            numbers.forEach(num => {
                frequency[num] = (frequency[num] || 0) + 1;
                if (frequency[num] > maxFreq) {
                    maxFreq = frequency[num];
                    modes = [num];
                } else if (frequency[num] === maxFreq) {
                    modes.push(num);
                }
            });

            const modeText = maxFreq > 1 ? modes.join(', ') : 'بدون مد';

            document.getElementById(`averageResult${index}`).textContent = 
                `میانگین حسابی: ${mean.toFixed(4)}\nمیانه: ${median.toFixed(4)}\nمد: ${modeText}`;
        }

        function showQuestion(index) {

            if (!state) return;

            // تولید سوالات ریاضی سطح هشتم

                'توان',
                'اعداد_منفی'
            ];

            let question = '';

                        correctAnswer = b;

                    break;

                    // ساده کردن کسر
                    function gcd(x, y) {
                        return y === 0 ? x : gcd(y, x % y);
                    }
                    const divisor = gcd(numerator, denominator);
                    correctAnswer = `${numerator/divisor}/${denominator/divisor}`;
                    break;
                    
                case 'درصد':
                    const percent = Math.floor(Math.random() * 50) + 10;
                    const number = Math.floor(Math.random() * 100) + 10;
                    question = `${percent}٪ از ${number} چیست؟`;
                    correctAnswer = Math.round((percent / 100) * number);
                    break;
                    
                case 'هندسه':
                    const shapes = ['مربع', 'مستطیل', 'مثلث', 'دایره'];
                    const shape = shapes[Math.floor(Math.random() * shapes.length)];
                    switch(shape) {
                        case 'مربع':
                            const side = Math.floor(Math.random() * 10) + 1;
                            question = `محیط مربع با ضلع ${side} چقدر است؟`;
                            correctAnswer = 4 * side;
                            break;
                        case 'مستطیل':
                            const l = Math.floor(Math.random() * 10) + 1;
                            const w = Math.floor(Math.random() * 10) + 1;
                            question = `مساحت مستطیل با طول ${l} و عرض ${w} چقدر است؟`;
                            correctAnswer = l * w;
                            break;
                        case 'مثلث':
                            const base = Math.floor(Math.random() * 10) + 1;
                            const height = Math.floor(Math.random() * 10) + 1;
                            question = `مساحت مثلث با قاعده ${base} و ارتفاع ${height} چقدر است؟`;
                            correctAnswer = 0.5 * base * height;
                            break;
                        case 'دایره':
                            const radius = Math.floor(Math.random() * 10) + 1;
                            question = `محیط دایره با شعاع ${radius} چقدر است؟ (π=3.14)`;
                            correctAnswer = Math.round(2 * 3.14 * radius);
                            break;
                    }
                    break;
                    
                case 'معادله_ساده':
                    const coeff = Math.floor(Math.random() * 5) + 1;
                    const constant = Math.floor(Math.random() * 10) + 1;
                    const result = Math.floor(Math.random() * 20) + 1;
                    question = `معادله ${coeff}x + ${constant} = ${result} را حل کنید.`;
                    correctAnswer = Math.round((result - constant) / coeff);
                    break;
                    
                case 'توان':
                    const baseNum = Math.floor(Math.random() * 5) + 2;
                    const exponentNum = Math.floor(Math.random() * 3) + 2;
                    question = `${baseNum} به توان ${exponentNum} چیست؟`;
                    correctAnswer = Math.pow(baseNum, exponentNum);
                    break;
                    
                case 'اعداد_منفی':
                    const neg1 = Math.floor(Math.random() * 20) - 10;
                    const neg2 = Math.floor(Math.random() * 20) - 10;
                    const op3 = Math.random() > 0.5 ? '+' : '-';
                    question = `${neg1} ${op3} (${neg2}) = ?`;
                    correctAnswer = op3 === '+' ? neg1 + neg2 : neg1 - neg2;
                    break;
            }
            
            // تولید گزینه‌ها
            let options = [correctAnswer];
            while (options.length < 4) {
                let randomOption;
                if (typeof correctAnswer === 'number') {
                    randomOption = correctAnswer + Math.floor(Math.random() * 10) - 5;
                    if (randomOption === correctAnswer) continue;
                } else {
                    // برای کسرها
                    randomOption = `${Math.floor(Math.random() * 5)+1}/${Math.floor(Math.random() * 5)+6}`;
                }
                
                if (!options.includes(randomOption)) {
                    options.push(randomOption);
                }
            }
            
            // مخلوط کردن گزینه‌ها
            options = options.sort(() => Math.random() - 0.5);
            
            // نمایش سوال
            document.getElementById(`question-container${index}`).innerHTML = `
                <div style="background: rgba(255,255,255,0.05); padding: 40px; border-radius: var(--border-radius); margin: 30px 0;">
                    <div style="font-size: 1.8em; margin-bottom: 30px; text-align: center; font-weight: 600;">
                        ${question}
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        ${options.map((option, i) => `
                            <button onclick="checkGameAnswer(${index}, ${JSON.stringify(option)}, ${JSON.stringify(correctAnswer)})" 
                                    style="background: var(--gradient-primary); border: none; color: white; padding: 20px; border-radius: var(--border-radius); cursor: pointer; font-size: 1.2em;">
                                ${option}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            
            // شروع تایمر
            state.timeLeft = 20;
            startTimer(index);
        }

        function startTimer(index) {
            const state = gameState[index];
            if (!state) return;
            
            if (state.timer) clearInterval(state.timer);
            
            state.timer = setInterval(() => {
                state.timeLeft--;
                document.getElementById(`timer${index}`).textContent = `⏰ ${state.timeLeft} ثانیه`;
                
                if (state.timeLeft <= 0) {
                    clearInterval(state.timer);
                    state.lives--;
                    document.getElementById(`lives${index}`).textContent = '❤️'.repeat(state.lives);
                    
                    if (state.lives <= 0) {
                        endGame(index);
                    } else {
                        nextQuestion(index);
                    }
                }
            }, 1000);
        }

        function checkGameAnswer(index, selectedAnswer, correctAnswer) {
            const state = gameState[index];
            if (!state) return;
            
            clearInterval(state.timer);
            
            const questionContainer = document.getElementById(`question-container${index}`);
            const buttons = questionContainer.querySelectorAll('button');
            
            buttons.forEach(btn => {
                btn.disabled = true;
                if (btn.textContent == correctAnswer) {
                    btn.style.background = 'var(--gradient-success)';
                } else if (btn.textContent == selectedAnswer) {
                    btn.style.background = 'var(--gradient-danger)';
                }
            });
            
            if (selectedAnswer == correctAnswer) {
                state.score += 100;
                state.correctAnswers++;
            } else {
                state.lives--;
                document.getElementById(`lives${index}`).textContent = '❤️'.repeat(state.lives);
            }
            
            document.getElementById(`total-score${index}`).textContent = state.score;
            document.getElementById(`correct-ratio${index}`).textContent = `${state.correctAnswers}/${state.currentQuestion}`;
            
            document.getElementById(`next-btn${index}`).style.display = 'inline-block';
            
            if (state.lives <= 0) {
                setTimeout(() => endGame(index), 1000);
            }
        }

        function nextQuestion(index) {
            const state = gameState[index];
            if (!state) return;
            
            state.currentQuestion++;
            
            if (state.currentQuestion > 20) {
                endGame(index);
            } else {
                document.getElementById(`next-btn${index}`).style.display = 'none';
                showQuestion(index);
            }
        }

        function endGame(index) {
            const state = gameState[index];
            if (!state) return;
            
            clearInterval(state.timer);
            
            // ذخیره رکورد
            const highScore = parseInt(localStorage.getItem('mathHighScore') || '0');
            if (state.score > highScore) {
                localStorage.setItem('mathHighScore', state.score.toString());
                document.getElementById(`high-score${index}`).textContent = state.score;
            }
            
            // نمایش صفحه پایان
            document.getElementById(`game-screen${index}`).classList.remove('active');
            
            const endHTML = `
                <div style="text-align: center; padding: 40px;">
                    <h3 style="color: var(--accent); margin-bottom: 30px; font-size: 2em;">🎉 بازی تمام شد!</h3>
                    <div style="background: rgba(255,255,255,0.05); padding: 30px; border-radius: var(--border-radius); margin-bottom: 30px;">
                        <div style="font-size: 3em; font-weight: bold; color: var(--warning); margin: 20px 0;">
                            ${state.score} امتیاز
                        </div>
                        <div style="color: var(--light); font-size: 1.2em; margin-bottom: 20px;">
                            ${state.correctAnswers} از 20 سوال صحیح پاسخ داده شد
                        </div>
                        <div style="color: var(--light);">
                            رکورد قبلی: ${highScore}
                        </div>
                    </div>
                    <button onclick="startGame(${index})" style="background: var(--gradient-success); color: white; padding: 20px 40px; font-size: 1.2em; border: none; border-radius: var(--border-radius); cursor: pointer;">
                        🔄 بازی مجدد
                    </button>
                </div>
            `;
            
            document.getElementById(`game-screen${index}`).innerHTML = endHTML;
            document.getElementById(`game-screen${index}`).classList.add('active');
        }

        // سیستم هوش مصنوعی
        function sendAIMessage(index) {
            const input = document.getElementById(`ai-input${index}`);
            const message = input.value.trim();
            
            if (!message) return;
            
            // نمایش پیام کاربر
            addMessage(index, message, 'user');
            input.value = '';
            
            // تولید پاسخ هوش مصنوعی
            setTimeout(() => {
                const response = generateAIResponse(message);
                addMessage(index, response, 'ai');
            }, 1000);
        }

        function addMessage(index, text, sender) {
            const messagesContainer = document.getElementById(`chat-messages${index}`);
            if (!messagesContainer) return;
            
            const messageElement = document.createElement('div');
            messageElement.className = `message ${sender}-message`;
            messageElement.textContent = text;
            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function askSampleQuestion(index, question) {
            document.getElementById(`ai-input${index}`).value = question;
            sendAIMessage(index);
        }

        function generateAIResponse(question) {
            const lowerQ = question.toLowerCase();
            
            if (lowerQ.includes('مشتق')) {
                return 'مشتق x^n برابر است با n*x^(n-1). برای مثال:\n- مشتق x^2 = 2x\n- مشتق x^3 = 3x^2\n- مشتق x = 1';
            } else if (lowerQ.includes('انتگرال')) {
                return 'انتگرال x^n dx برابر است با x^(n+1)/(n+1) + C. برای مثال:\n- ∫x dx = x^2/2 + C\n- ∫x^2 dx = x^3/3 + C\n- ∫2x dx = x^2 + C';
            } else if (lowerQ.includes('حل کن') || lowerQ.includes('معادله')) {
                return 'برای حل معادله 2x+5=15:\n1) 2x = 15-5\n2) 2x = 10\n3) x = 5\n\nپاسخ: x = 5';
            } else if (lowerQ.includes('اول')) {
                return 'اعداد اول بین ۱ تا ۲۰:\n۲, ۳, ۵, ۷, ۱۱, ۱۳, ۱۷, ۱۹\n\nویژگی اعداد اول: فقط بر ۱ و خودشان بخش‌پذیرند.';
            } else if (lowerQ.includes('فیثاغورث')) {
                return 'قضیه فیثاغورث: در مثلث قائم‌الزاویه، مربع وتر برابر است با مجموع مربعات دو ضلع دیگر.\n\nفرمول: a² + b² = c²\n\nمثال: اگر a=3 و b=4 باشد:\nc = √(3² + 4²) = √(9 + 16) = √25 = 5';
            } else {
                return 'سوال خوبی پرسیدی! من یک دستیار ریاضی هوشمند هستم و می‌توانم در زمینه‌های زیر کمک کنم:\n\n• حل مسائل جبری\n• محاسبات مشتق و انتگرال\n• توضیح قضایای ریاضی\n• حل معادلات\n• مفاهیم هندسی\n\nلطفا سوال خود را دقیق‌تر بیان کنید.';
            }
        }

        // سیستم تاریخچه ریاضیات
        function displayMathematicians(index) {
            const container = document.getElementById(`mathematicians-container${index}`);
            if (!container) return;
            
            container.innerHTML = '';
            
            mathematicians.forEach(math => {
                const article = document.createElement('div');
                article.className = 'article-card';
                article.innerHTML = `
                    <h3 class="article-title">${math.name}</h3>
                    <div class="article-meta">
                        <span>📅 دوره: ${math.era}</span>
                        <span>🏛️ تخصص: ریاضیات، نجوم، فلسفه</span>
                    </div>
                    <div class="article-content">
                        ${math.article}
                    </div>
                    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                        <strong>خلاصه دستاوردها:</strong> ${math.contributions}
                    </div>
                `;
                container.appendChild(article);
            });
            
            // نمایش اولین فلش کارت
            nextFlashCard(index);
        }

        function displayDefinitions(index) {
            const container = document.getElementById(`definitions-container${index}`);
            if (!container) return;
            
            container.innerHTML = '';
            
            mathDefinitions.forEach(category => {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'definition-category';
                categoryDiv.innerHTML = `
                    <h3 style="color: var(--accent); margin-bottom: 20px; font-size: 1.5em; border-bottom: 2px solid var(--accent); padding-bottom: 10px;">
                        ${category.category}
                    </h3>
                `;
                
                category.definitions.forEach(def => {
                    const card = document.createElement('div');
                    card.className = 'definition-card';
                    card.innerHTML = `
                        <div class="definition-term">${def.term}</div>
                        <div class="definition-content">${def.definition}</div>
                        ${def.example ? `<div class="definition-example">مثال: ${def.example}</div>` : ''}
                    `;
                    categoryDiv.appendChild(card);
                });
                
                container.appendChild(categoryDiv);
            });
        }

        function searchMathematicians(index, query) {
            const container = document.getElementById(`mathematicians-container${index}`);
            if (!container) return;
            
            const filtered = mathematicians.filter(math => 
                math.name.includes(query) || 
                math.contributions.includes(query) ||
                math.era.includes(query) ||
                math.article.includes(query)
            );
            
            container.innerHTML = '';
            
            if (filtered.length === 0) {
                const noResult = document.createElement('div');
                noResult.className = 'result';
                noResult.textContent = 'نتیجه‌ای یافت نشد';
                container.appendChild(noResult);
                return;
            }
            
            filtered.forEach(math => {
                const article = document.createElement('div');
                article.className = 'article-card';
                article.innerHTML = `
                    <h3 class="article-title">${math.name}</h3>
                    <div class="article-meta">
                        <span>📅 دوره: ${math.era}</span>
                        <span>🏛️ تخصص: ریاضیات، نجوم، فلسفه</span>
                    </div>
                    <div class="article-content">
                        ${math.article}
                    </div>
                    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                        <strong>خلاصه دستاوردها:</strong> ${math.contributions}
                    </div>
                `;
                container.appendChild(article);
            });
        }

        // تابع کارت 3D
        function flipCard(card) {
            card.classList.toggle('flipped');
        }

        function nextFlashCard(index) {
            const randomCard = flashCards[Math.floor(Math.random() * flashCards.length)];
            document.getElementById(`flashcard-term${index}`).textContent = randomCard.term;
            document.getElementById(`flashcard-def${index}`).textContent = randomCard.definition;
            
            // برگرداندن کارت به حالت اول اگر برگشته بود
            const cardElement = document.querySelector(`#tab${index} .math-card-3d`);
            if (cardElement && cardElement.classList.contains('flipped')) {
                cardElement.classList.remove('flipped');
            }
        }

        // بارگذاری اولیه
        window.onload = function() {
            // تنظیم رکورد بالا در مسابقه
            document.querySelectorAll('[id^="start-high-score"]').forEach(el => {
                el.textContent = localStorage.getItem('mathHighScore') || '0';
            });
        };
    </script>
</body>
</html>
